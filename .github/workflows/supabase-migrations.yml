name: Deploy Supabase Migrations (Manual Safety Gate)

on:
  workflow_dispatch:
    inputs:
      confirm_push:
        description: 'Set to "true" to attempt a dry-run or list check. Automatic mutation is disabled.'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Supabase Reality Check (No Mutation)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
          echo "Listing migrations to verify state. Mutation (db push) is DISABLED in this workflow."
          supabase migration list
          echo "Safety Gate: Manual intervention required for database mutations."

